name: lms_flutter
description: A Flutter version of the Learning Management System.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  google_sign_in: ^6.2.1
  lucide_icons: ^0.321.0
  google_fonts: ^6.1.0
  flutter_markdown: ^0.6.18
  youtube_player_flutter: ^8.1.2
  syncfusion_flutter_pdfviewer: ^24.2.3
  google_generative_ai: ^0.2.2
  provider: ^6.1.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
